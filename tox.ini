[tox]
envlist = py312, lint
isolated_build = true

[testenv]
deps =
    pytest
    pytest-trio
    pytest-cov
    httpx
commands_pre =
    python -m pip install --upgrade pip
    python -m pip install -e .[test]
commands =
    pytest tests/

[testenv:lint]
commands_pre =
    python -m pip install --upgrade pip
    python -m pip install -e .[dev]
commands =
    ruff check .
    ruff format --check .
    mypy py_ipfs_lite

