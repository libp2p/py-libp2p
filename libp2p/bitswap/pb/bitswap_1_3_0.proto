// bitswap_1_3_0.proto
// Bitswap 1.3.0 — adds PAYMENT_REQUIRED block presence and in-band payment flow
// Backward compatible with 1.2.0: new fields use field numbers 6, 7, 8, 9
// New enum value PaymentRequired = 2 (proto3 open enums — safe for old parsers)

syntax = "proto3";

package bitswap.pb.v130;

message Message {

  // ─── EXISTING: Wantlist (unchanged from 1.2.0) ─────────────────────────
  message Wantlist {
    enum WantType {
      Block = 0;   // default: client wants the full block
      Have  = 1;   // client only wants to know if server has it
    }
    message Entry {
      bytes    block        = 1;  // CID bytes (CIDv1 binary)
      int32    priority     = 2;  // higher = serve first; default 1
      bool     cancel       = 3;  // true = remove from wantlist
      WantType wantType     = 4;  // Block or Have
      bool     sendDontHave = 5;  // server MUST respond DONT_HAVE if missing
    }
    repeated Entry entries = 1;
    bool full              = 2;   // true = authoritative wantlist replacement
  }

  // ─── EXISTING: Block payload (unchanged from 1.1.0) ─────────────────────
  message Block {
    bytes prefix = 1;  // CID prefix: version + codec varint
    bytes data   = 2;  // raw block bytes
  }

  // ─── EXTENDED: BlockPresenceType — NEW value PaymentRequired = 2 ────────
  enum BlockPresenceType {
    Have            = 0;   // server has the block
    DontHave        = 1;   // server genuinely does not have the block
    PaymentRequired = 2;   // [NEW 1.3.0] server has the block but requires payment
                           // Old parsers: see integer 2, no matching case → skip entry
  }

  // ─── EXISTING: BlockPresence (unchanged structure, extended enum) ────────
  message BlockPresence {
    bytes             cid  = 1;
    BlockPresenceType type = 2;  // Now can be 0, 1, or 2
  }

  // ─── NEW 1.3.0: PaymentTerms — embedded in Message when type=PaymentRequired
  message PaymentTerms {
    bytes  cid           = 1;  // CID of the gated block
    string asset         = 2;  // Token contract address
    string pay_to        = 3;  // Server's wallet address
    uint64 amount        = 4;  // Amount in token's smallest unit
    string network       = 5;  // Chain identifier: "base-sepolia" | "base-mainnet"
    bytes  nonce         = 6;  // Random 32 bytes — per-offer, prevents replay attacks
    uint64 valid_before  = 7;  // Unix timestamp: offer expires after this
    uint64 block_size    = 8;  // Actual block size in bytes
    string description   = 9;  // Human-readable description
    string scheme        = 10; // Payment scheme: "exact" (EIP-3009)
  }

  // ─── NEW 1.3.0: PaymentAuthorization — client's signed proof of payment
  message PaymentAuthorization {
    bytes  cid          = 1;  // CID being paid for
    string from_address = 2;  // Client's wallet address
    string to_address   = 3;  // Must match PaymentTerms.pay_to
    uint64 value        = 4;  // Must be >= PaymentTerms.amount
    uint64 valid_after  = 5;  // EIP-3009 validAfter (typically 0)
    uint64 valid_before = 6;  // EIP-3009 validBefore
    bytes  nonce        = 7;  // Must match PaymentTerms.nonce exactly
    uint32 v            = 8;  // ECDSA signature recovery id (27 or 28)
    bytes  r            = 9;  // ECDSA r component (32 bytes)
    bytes  s            = 10; // ECDSA s component (32 bytes)
    string scheme       = 11; // Must match PaymentTerms.scheme
  }

  // ─── NEW 1.3.0: PaymentReceipt — server confirms payment accepted
  message PaymentReceipt {
    bytes  cid      = 1;  // CID now authorized to be served
    string tx_hash  = 2;  // On-chain tx hash (empty in OPTIMISTIC mode)
    uint64 expires  = 3;  // Unix ts: this authorization is valid until this time
  }

  // ─── NEW 1.3.0: PaymentRejection — server rejects a PaymentAuthorization
  message PaymentRejection {
    bytes  cid    = 1;
    string reason = 2;  // "INVALID_SIGNATURE" | "WRONG_AMOUNT" | "NONCE_USED" | "EXPIRED"
  }

  // ─── TOP-LEVEL MESSAGE FIELDS ──────────────────────────────────────────
  // Fields 1-5: identical to Bitswap 1.2.0 (never modified)
  Wantlist             wantlist              = 1;
  repeated bytes       blocks                = 2;  // deprecated since 1.1.0
  repeated Block       payload               = 3;
  repeated BlockPresence blockPresences      = 4;  // type=2 means PAYMENT_REQUIRED
  int32                pendingBytes          = 5;

  // Fields 6-9: NEW in 1.3.0 (safe unknown fields for old parsers)
  repeated PaymentTerms         payment_terms          = 6;  // server → client
  repeated PaymentAuthorization payment_authorizations = 7;  // client → server
  repeated PaymentReceipt       payment_receipts       = 8;  // server → client
  repeated PaymentRejection     payment_rejections     = 9;  // server → client
}
